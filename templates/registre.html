{% extends "base.html" %}

{% block contingut %}

<h2 class="card-title text-center mb-4">Crear Compte</h2>

<form action="/registre" method="POST">
    <div class="mb-3">
        <label for="nom" class="form-label">Nom complet</label>
        <input type="text" class="form-control" id="nom" name="nom" placeholder="El teu nom" required>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Correu electrònic</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="nom@exemple.com" required>
    </div>

    <div class="mb-3">
        <label for="password" class="form-label">Contrasenya</label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>

    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="terms" required>
        <label class="form-check-label" for="terms">Accepto els termes i condicions</label>
    </div>

    <button type="submit" class="btn btn-primary w-100">Registra't</button>
</form>

{% endblock %}
